<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页 - GitHub Pages 部署成功</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 2.5rem;
        }
        .checkmark {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 24px;
            font-size: 1.1rem;
        }
        .info {
            background: #f0f0f0;
            border-radius: 16px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #2c3e50;
            word-break: break-all;
        }
        footer {
            margin-top: 32px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">🎉</div>
        <h1>GitHub Pages 部署成功！</h1>
        <p>如果你能看到这个页面，说明你的静态网站已经可以通过<br>
        <strong>https://jywud.github.io</strong> 正常访问了。</p>
        <div class="info">
            ✅ 测试时间：<span id="time"></span><br>
            📁 文件路径：/index.html<br>
            🌍 用户站点：jywud.github.io
        </div>
        <footer>
            这是测试文件，你可以用你的实际网页内容（如 portfolio、博客等）替换它。
        </footer>
    </div>

    <script>
        // 显示当前时间
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
